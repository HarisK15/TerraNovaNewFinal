<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Template Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px; margin: 10px 0; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; }
        .result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Export Template Test</h1>
    <p>This page demonstrates how the Statistical Summary template should transform your data.</p>
    
    <div>
        <button id="loadSalesData">Load Sales Data</button>
        <button id="generateSummary">Generate Statistical Summary</button>
    </div>
    
    <div class="result">
        <h2>Result:</h2>
        <pre id="output">Load data first...</pre>
    </div>
    
    <script>
        let salesData = [];
        let columns = [];
        
        // Load sales data
        document.getElementById('loadSalesData').addEventListener('click', async () => {
            try {
                const response = await fetch('/sample_data/sales_data.csv');
                const csvText = await response.text();
                
                // Parse CSV to array of objects
                const rows = csvText.split('\n');
                columns = rows[0].split(',');
                
                // Process each row
                salesData = [];
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    
                    const cells = rows[i].split(',');
                    const rowObj = {};
                    
                    columns.forEach((col, idx) => {
                        // Try to parse numeric values
                        const value = cells[idx];
                        if (!isNaN(value) && value.trim() !== '') {
                            rowObj[col] = parseFloat(value);
                        } else {
                            rowObj[col] = value;
                        }
                    });
                    
                    salesData.push(rowObj);
                }
                
                document.getElementById('output').textContent = 
                    `Loaded ${salesData.length} rows with columns: ${columns.join(', ')}`;
            } catch (error) {
                document.getElementById('output').textContent = 
                    `Error loading data: ${error.message}`;
            }
        });
        
        // Generate statistical summary
        document.getElementById('generateSummary').addEventListener('click', () => {
            if (salesData.length === 0) {
                document.getElementById('output').textContent = 'Please load data first';
                return;
            }
            
            try {
                // Create workbook
                const workbook = XLSX.utils.book_new();
                
                // Add raw data sheet
                const rawDataSheet = XLSX.utils.json_to_sheet(salesData);
                XLSX.utils.book_append_sheet(workbook, rawDataSheet, 'Raw Data');
                
                // Find numeric columns
                const numericColumns = columns.filter(col => {
                    return salesData.some(row => typeof row[col] === 'number');
                });
                
                // Calculate statistics for each numeric column
                const stats = numericColumns.map(col => {
                    const values = salesData
                        .map(row => parseFloat(row[col]))
                        .filter(val => !isNaN(val));
                    
                    if (values.length === 0) return { column: col, stats: {} };
                    
                    // Sort values for median calculation
                    const sortedValues = [...values].sort((a, b) => a - b);
                    
                    // Calculate basic statistics
                    const count = values.length;
                    const sum = values.reduce((acc, val) => acc + val, 0);
                    const mean = sum / count;
                    const min = Math.min(...values);
                    const max = Math.max(...values);
                    
                    // Calculate median
                    let median;
                    if (count % 2 === 0) {
                        median = (sortedValues[count/2 - 1] + sortedValues[count/2]) / 2;
                    } else {
                        median = sortedValues[Math.floor(count/2)];
                    }
                    
                    // Calculate standard deviation
                    const variance = values.reduce((acc, val) => 
                        acc + Math.pow(val - mean, 2), 0) / count;
                    const stddev = Math.sqrt(variance);
                    
                    // Calculate quartiles
                    const q1 = sortedValues[Math.floor(count * 0.25)];
                    const q3 = sortedValues[Math.floor(count * 0.75)];
                    
                    // Count null/empty values
                    const nullCount = salesData.filter(row => 
                        row[col] === null || row[col] === undefined || row[col] === '').length;
                    
                    // Count unique values
                    const uniqueValues = new Set(salesData.map(row => row[col])).size;
                    
                    return {
                        column: col,
                        stats: {
                            'Count': count,
                            'Null Count': nullCount,
                            'Unique Values': uniqueValues,
                            'Min': min,
                            'Max': max,
                            'Sum': sum,
                            'Mean': mean,
                            'Median': median,
                            'Std Dev': stddev,
                            'Variance': variance,
                            'Q1 (25%)': q1,
                            'Q3 (75%)': q3
                        }
                    };
                });
                
                // Create summary data
                const summaryData = [
                    ['Column', 'Count', 'Null Count', 'Unique Values', 'Min', 'Max', 
                    'Sum', 'Mean', 'Median', 'Std Dev', 'Variance', 'Q1 (25%)', 'Q3 (75%)']
                ];
                
                stats.forEach(colStats => {
                    summaryData.push([
                        colStats.column,
                        colStats.stats['Count'],
                        colStats.stats['Null Count'],
                        colStats.stats['Unique Values'],
                        colStats.stats['Min'],
                        colStats.stats['Max'],
                        colStats.stats['Sum'],
                        colStats.stats['Mean'],
                        colStats.stats['Median'],
                        colStats.stats['Std Dev'],
                        colStats.stats['Variance'],
                        colStats.stats['Q1 (25%)'],
                        colStats.stats['Q3 (75%)']
                    ]);
                });
                
                // Create summary stats sheet
                const statsSheet = XLSX.utils.aoa_to_sheet(summaryData);
                XLSX.utils.book_append_sheet(workbook, statsSheet, 'Summary Statistics');
                
                // Generate output summary
                let output = 'Statistical Summary Generated:\n\n';
                output += 'Numeric Columns Analyzed: ' + numericColumns.join(', ') + '\n\n';
                
                stats.forEach(colStats => {
                    output += `Column: ${colStats.column}\n`;
                    for (const [key, value] of Object.entries(colStats.stats)) {
                        output += `  ${key}: ${typeof value === 'number' ? value.toFixed(2) : value}\n`;
                    }
                    output += '\n';
                });
                
                document.getElementById('output').textContent = output;
                
                // Download the file
                XLSX.writeFile(workbook, 'statistical-summary.xlsx');
            } catch (error) {
                document.getElementById('output').textContent = 
                    `Error generating summary: ${error.message}`;
            }
        });
    </script>
</body>
</html>
